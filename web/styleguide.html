<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Style Guide</title>

<link rel='stylesheet' href='css/main.css'>
<link rel='stylesheet' href='css/theme-glassmorphism.css'>

<style>
body{
font-family:system-ui;
margin:20px;
}

.section{
margin-bottom:50px;
}

.title{
font-size:18px;
font-weight:700;
margin-bottom:8px;
}

.compare{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.label{
font-size:12px;
opacity:.6;
margin-bottom:6px;
}

.info{
font-size:11px;
font-family:monospace;
white-space:pre-line;
margin-top:6px;
opacity:.8;
}
</style>

</head>
<body>

<h1>CSS Style Guide</h1>

<button onclick="document.body.classList.toggle('dark')">
Dark Mode Toggle
</button>

<div id="app"></div>

<script>

const items = [
"sidebar",
"modal",
"tabs",
"pagination",
"filter-bar",
"search",
"chart-container",
"card",
"badge",
"dropdown"
]

function create(name){
return `
<div class="section">

<div class="title">.${name}</div>

<div class="compare">

<div>
<div class="label">main.css</div>
<div class="${name}" data-style>
${content(name)}
</div>
<div class="info"></div>
</div>

<div>
<div class="label">main + glass</div>
<div class="${name} glass" data-style>
${content(name)}
</div>
<div class="info"></div>
</div>

</div>

</div>
`
}

function content(name){

switch(name){

case "tabs":
return `
<button class="tab active">Tab1</button>
<button class="tab">Tab2</button>
`

case "pagination":
return `
<button>1</button>
<button class="active">2</button>
<button>3</button>
`

case "search":
return `<input placeholder="search">`

case "dropdown":
return `
<select>
<option>Option1</option>
<option>Option2</option>
</select>
`

case "chart-container":
return `Chart Area`

default:
return "sample"
}

}

document.getElementById("app").innerHTML =
items.map(create).join("")

function style(el){

const s = getComputedStyle(el)

return `
bg: ${s.background}
color: ${s.color}
font: ${s.fontSize}
radius: ${s.borderRadius}
shadow: ${s.boxShadow}
blur: ${s.backdropFilter}
`
}

document.querySelectorAll("[data-style]").forEach(el=>{
el.nextElementSibling.textContent = style(el)
})

</script>

</body>
</html>
