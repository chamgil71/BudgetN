years:
  base_year: 2026
pipeline:
  run_mode: manual
  watch_interval: 3
  after_convert: keep
  archive_dir: input/processed
output:
  save_individual: true
  individual_dir: database/output/individual/
  merge_mode: upsert
  dashboard_compatible: true
  auto_fill_defaults: true
pk_field: code
exclude_codes: []
xlsx:
  template_file: template_project.xlsx
  data_sheet: 사업목록
  sub_projects_sheet: 내역사업
  managers_sheet: 사업관리자
  kpi_sheet: 성과지표
  history_sheet: 사업연혁
  yearly_budget_sheet: 연도별예산
  header_row: 2
  data_start_row: 3
  stop_on_empty: true
  column_mapping:
    사업코드: code
    사업명: project_name
    부처명: department
    소관부서: division
    회계유형: account_type
    분야: field
    부문: sector
    상태: status
    지원유형: support_type
    시행기관: implementing_agency
    보조율: subsidy_rate
    융자율: loan_rate
    프로그램코드: program.code
    프로그램명: program.name
    단위사업코드: unit_project.code
    단위사업명: unit_project.name
    세부사업코드: detail_project.code
    세부사업명: detail_project.name
    _budget_settlement: budget.{settlement}_settlement|to_float
    _budget_original: budget.{prev}_original|to_float
    _budget_supplementary: budget.{prev}_supplementary|to_float
    _budget_request: budget.{base}_request|to_float
    _budget_confirmed: budget.{base}_budget|to_float
    사업시작연도: project_period.start_year|to_int
    사업종료연도: project_period.end_year|to_int
    사업기간(원문): project_period.raw
    총사업비: total_cost.total|to_float
    국고: total_cost.government|to_float
    총사업비(원문): total_cost.raw
    AI도메인: ai_domains|to_list
    AI기술유형: ai_tech|to_list
    R&D단계: rnd_stage|to_list
    키워드: keywords|to_list
    사업목적: purpose
    사업내용: description
    법적근거: legal_basis
    효과성: effectiveness
    집행방법: execution_detail.method
    사업수혜자: execution_detail.recipients
    예산산출근거: budget_calculation|to_text
  sub_projects_mapping:
    상위사업코드: parent_code
    내역사업명: name
    _sub_year0: budget_{settlement}|to_float
    _sub_year1: budget_{prev}|to_float
    _sub_year2: budget_{base}|to_float
  managers_mapping:
    상위사업코드: parent_code
    내역사업: sub_project
    소관부서: managing_dept
    시행기관: implementing_agency
    담당자: manager
    전화번호: phone
  history_mapping:
    상위사업코드: parent_code
    연도: year|to_int
    내용: description
converters:
  to_float:
    type: float
    on_error: null
  to_int:
    type: int
    on_error: null
  to_list:
    type: list
    separator: ','
    strip: true
    on_error: []
  to_text:
    type: text
    on_error: null
derived_fields:
  name:
    formula: '{department}_{project_name}'
  is_rnd:
    formula: contains(project_name, '(R&D)')
  is_informatization:
    formula: contains(project_name, '(정보화)')
  budget.change_amount:
    formula: budget.{base}_budget - budget.{prev}_original
    condition: budget.{base}_budget is not null and budget.{prev}_original is not null
  budget.change_rate:
    formula: (budget.change_amount / budget.{prev}_original) * 100
    condition: budget.{prev}_original is not null and budget.{prev}_original != 0
  project_period.duration:
    formula: str(project_period.end_year - project_period.start_year + 1) + '년'
    condition: project_period.start_year is not null and project_period.end_year is
      not null
defaults:
  division: null
  account_type: null
  field: null
  sector: null
  status: null
  support_type: null
  implementing_agency: null
  subsidy_rate: null
  loan_rate: null
  program:
    code: null
    name: null
  unit_project:
    code: null
    name: null
  detail_project:
    code: null
    name: null
  project_managers: []
  project_period:
    start_year: null
    end_year: null
    duration: null
    raw: null
  total_cost:
    total: null
    government: null
    raw: null
  sub_projects: []
  purpose: null
  description: null
  legal_basis: null
  effectiveness: null
  execution_detail:
    method: null
    recipients: null
    subsidy_rate_detail: null
  budget_calculation: []
  overview: {}
  kpi: []
  history: []
  yearly_budgets: {}
  ai_domains: []
  ai_tech: null
  rnd_stage: null
  keywords: []
  page_start: null
  page_end: null
validation:
  strict_mode: false
  required_fields:
  - code
  - project_name
  - department
  - budget.2026_budget
  allowed_values:
    account_type:
    - 일반회계
    - 특별회계
    - 기금
    status:
    - 계속
    - 신규
    support_type:
    - 직접
    - 출연
    - 보조
    - 융자
    - 출자
  budget_range:
    min: 0
    max: 10000000
metadata:
  source: 사용자 입력 (KAIB 파이프라인)
project:
  name: AI 재정계획 분석 플랫폼
  year: 2026
  version: 1.0.0
schema:
  project_columns:
  - id
  - project_name
  - code
  - department
  - division
  - implementing_agency
  - account_type
  - field
  - sector
  - program_code
  - program_name
  - unit_project_code
  - unit_project_name
  - detail_project_code
  - detail_project_name
  - status
  - support_type
  - is_rnd
  - is_informatization
  - start_year
  - end_year
  - duration
  - total_cost
  - total_gov_cost
  - budget_{settlement}_settlement
  - budget_{prev}_original
  - budget_{prev}_supplementary
  - budget_{base}_request
  - budget_{base}_budget
  - purpose
  - description
  - legal_basis
  - ai_tech_types
  - rnd_stage
  - ai_domains
  - page_start
  - page_end
  sub_project_columns:
  - parent_id
  - sub_project_name
  - budget_{settlement}
  - budget_{prev}
  - budget_{base}
  - managing_dept
  - implementing_agency

search_aliases:
  '과기부': ['과학기술정보통신부', '과기정통부']
  '과기정통부': ['과학기술정보통신부', '과기부']
  '행안부': ['행정안전부']
  '문체부': ['문화체육관광부']
  '산업부': ['산업통상자원부', '산자부']
  '산자부': ['산업통상자원부', '산업부']
  '복지부': ['보건복지부']
  '국토부': ['국토교통부']
  '농식품부': ['농림축산식품부']
  '해수부': ['해양수산부']
  '중기부': ['중소벤처기업부']
  '여가부': ['여성가족부']
  '기재부': ['기획재정부']
  '식약처': ['식품의약품안전처']
  '과기평': ['정보통신기획평가원', 'iitp']
  'iitp': ['정보통신기획평가원', '과기평']
  'nipa': ['정보통신산업진흥원']
  'nia': ['한국지능정보사회진흥원']