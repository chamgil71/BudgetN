# [주의사항]
# 1. Key(최종값)와 Value(찾을 패턴) 사이에는 반드시 콜론(:)과 공백이 있어야 함.
# 2. 리스트 항목은 반드시 하이픈(-)과 공백으로 시작해야 함.
# 3. 정규식 특수문자(^, $, *, +, ?, |, (, ), [, ], {, }, \)를 포함할 때는 
#    반드시 따옴표(' ')로 감싸야 YAML 파서 오류를 방지할 수 있음.
# 4. '13'처럼 숫자로만 된 값은 문자열로 인식시키기 위해 따옴표 사용 권장.

# 필드별 개별 규칙 설정
department:
  과학기술정보통신부:
    - '^.*과학기술\s*정보\s*통신부.*$'  # '13 과학기술 정보통신부' 등 어떤 수식어가 붙어도 전체 치환
    - '^13(\s*\(?과기정통부\)?)?$'      # '13' 또는 '13 (과기정통부)' 전체 치환
    - '^.*과기정통부.*$'                # '과기정통부'가 포함된 필드 전체 치환
    - '^국제협력관$'                    # 정확히 이 단어일 때만 치환
    - '^소관명$'

  중소벤처기업부:
    - '^.*중\s*소\s*벤\s*처\s*기\s*업\s*부.*$' # 공백이 섞인 명칭 포함 시 전체 치환
    - '^.*중소벤처.*$'

  산업통상자원부: # 표준 명칭으로 설정
    - '^.*산업통상부.*$'
    - '^.*산자부.*$'

description:
  연구개발: 
    - 'R&D'
    - '알앤디'